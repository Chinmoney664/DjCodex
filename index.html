<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex - DJ Shows and Links</title>
  <meta name="description" content="Upcoming shows, mixes, and booking links for DJ Codex.">
  <link rel="stylesheet" href="codex.css">
</head>
<body>
  <main class="site-shell">
    <section class="link-card" aria-label="Codex DJ links">
      <div class="hero">
        <div class="wordmark" aria-label="Codex">
          <strong>Codex</strong>
          <span>EDM / Mandarin Pop</span>
        </div>

        <a class="next-show" href="#" aria-label="Next show: Neon Room tickets">
          <small>Next show</small>
          <b>Neon Room</b>
          <span>Fri, May 10 · 11:30 PM · New York</span>
        </a>
      </div>

      <nav class="links" aria-label="Primary links">
        <a class="link" href="#">
          <span class="date-badge">May<br>10</span>
          <span class="link-copy">
            <b>Neon Room</b>
            <small>Tickets and tables</small>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>

        <a class="link" href="#">
          <span class="date-badge">May<br>24</span>
          <span class="link-copy">
            <b>Mandopop Night</b>
            <small>RSVP and venue info</small>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>

        <a class="link" href="#">
          <span class="date-badge">Jun<br>07</span>
          <span class="link-copy">
            <b>Festival Afterparty</b>
            <small>Lineup and entry</small>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>

        <a class="link" href="#">
          <span class="date-badge">Mix</span>
          <span class="link-copy">
            <b>Codex 001</b>
            <small>Listen before the show</small>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>
      </nav>
    </section>
  </main>
</body>
</html>
